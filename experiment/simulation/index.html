<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhET-Grade Membrane Transport</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>

    <!-- Institutional Header -->
    <header class="sim-header">
        <div class="logo-container">
            <img src="images\logo.png" alt="Amrita Vishwa Vidyapeetham Logo" class="institution-logo">
        </div>
        <div class="title-container">
            <h1 class="sim-title">Osmosis and Diffusion in Cells</h1>
        </div>
    </header>

    <div class="phet-grid">
        <!-- LEFT PANEL: Solute Controls -->
        <aside class="left-panel">
            <div class="settings-group">
                <h3 class="panel-header-sm">Mode</h3>
                <select id="mode-select" class="mode-select"
                    style="width:100%; padding: 8px; margin-bottom: 1rem; border-radius: 4px; border: 1px solid #ccc;">
                    <option value="diffusion">Diffusion</option>
                    <option value="facilitated">Facilitated Diffusion</option>
                    <option value="osmosis">Osmosis</option>
                </select>
            </div>

            <h2 class="panel-header">Solutes</h2>
            <div id="solute-controls" class="solute-list">
                <!-- Generated JS Controls here -->
            </div>
            <!--
            <div class="settings-group" style="margin-top: auto; padding-top: 1rem; border-top: 1px solid #eee;">
                <h3 class="panel-header-sm">Options</h3>
                <label class="toggle-row"
                    style="display: flex; gap: 8px; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">
                    <input type="checkbox" id="chk-highlight"> Highlight Crossings
                </label>
                <label class="toggle-row" style="display: flex; gap: 8px; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="chk-sound"> Crossing Sound
                </label>
            </div>-->
        </aside>

        <!-- CENTER PANEL: Simulation & Playback -->
        <main class="center-panel">
            <div class="simulation-wrapper">
                <canvas id="simCanvas"></canvas>

                <!-- Diagrammatic Labels -->
                <div class="sim-label label-outside">Outside</div>
                <div class="sim-label label-inside">Inside</div>

                <!-- Channel Toggles -->
                <div class="channel-toggles">
                    <div class="channel-toggle" title="Aquaporin">
                        <input type="checkbox" id="chk-aquaporin"> <label for="chk-aquaporin">H₂O Channel
                            (Aquaporin)</label>
                    </div>
                    <div class="channel-toggle" title="Na+ Channel">
                        <input type="checkbox" id="chk-na-channel"> <label for="chk-na-channel">Na⁺ Ion Channel</label>
                    </div>
                    <div class="channel-toggle" title="Glucose Transporter">
                        <input type="checkbox" id="chk-glu-transporter"> <label for="chk-glu-transporter">Glucose
                            Transporter</label>
                    </div>
                </div>
            </div>

            <!-- Playback Bar -->
            <div class="playback-bar">
                <button id="btn-play-pause" class="phet-button primary" aria-label="Play/Pause">
                    <span class="icon">⏸</span>
                </button>

                <div class="speed-control phet-panel-inset">
                    <span>Speed:</span>
                    <label style="cursor: pointer;"><input type="radio" name="speed" value="0.5"> Slow</label>
                    <label style="cursor: pointer;"><input type="radio" name="speed" value="1" checked> Normal</label>
                </div>

                <button id="btn-reset" class="phet-button warning" aria-label="Reset">
                    <span class="icon">🔄</span>
                </button>
            </div>
        </main>

        <!-- BOTTOM PANEL: Graphs & Data -->
        <section class="bottom-panel">
            <h3 class="panel-header-sm">Solute Concentrations</h3>
            <div id="concentration-cards" class="concentration-cards">
                <!-- Bars generated by JS -->
            </div>
        </section>
    </div>

    <script src="./simulation.js"></script>
    <script src="./ui.js"></script>
</body>

</html>
